version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Group minor and patch bumps into a single PR per week.
    # Major bumps get their own PR for careful review.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Do NOT enable auto-merge. Every update is reviewed by a human.
    # See CLAUDE.md for the full hygiene policy.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
